<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Ups & Downs Product Cost Report</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 520px;
      margin: auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
      color: #1f2937;
    }

    p {
      color: #555;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #111827;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover {
      background: #d1d5db;
    }

    .screen {
      display: none;
    }

    .active {
      display: block;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 18px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .message {
      margin-top: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <div id="homeScreen" class="screen active">
      <h1>Ups & Downs Product Cost Report</h1>
      <p>30-60-90 Day Product Cost Reporting System</p>

      <button onclick="showLogin()">Login</button>
      <button class="secondary" onclick="window.location.href='create-user.html'">
        Create User
      </button>
    </div>

    <div id="loginScreen" class="screen">
      <h1>Login</h1>
      <p>Enter your username and password.</p>

      <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>
        <button type="button" class="secondary" onclick="showHome()">Back</button>

        <div id="message" class="message"></div>
      </form>
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2Ci1tybNjQykngvcvWdppYAdnPhj6ukfdKUSTJARS1ER7Vp0XcjUFOSe-fq4GE1QFMg/exec";

    function showLogin() {
      document.getElementById("homeScreen").classList.remove("active");
      document.getElementById("loginScreen").classList.add("active");
    }

    function showHome() {
      document.getElementById("loginScreen").classList.remove("active");
      document.getElementById("homeScreen").classList.add("active");
      document.getElementById("message").textContent = "";
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const payload = {
        action: "loginUser",
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value.trim()
      };

      const message = document.getElementById("message");
      message.textContent = "Checking login...";

      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (!result.success) {
          message.textContent = result.message || "Invalid login.";
          return;
        }

        localStorage.setItem("currentUser", JSON.stringify(result.user));

        const role = String(result.user.role).trim().toLowerCase();

        if (role === "manager") {
          window.location.href = "manager.html";
        } else if (role === "sales rep") {
          window.location.href = "rep.html";
        } else {
          message.textContent = "Role not recognized. Please contact manager.";
        }

      } catch (err) {
        message.textContent = "Login error. Please try again.";
      }
    });
  </script>

</body>
</html>
