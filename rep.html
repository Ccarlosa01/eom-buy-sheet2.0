<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sales Rep Portal</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .page {
      max-width: 1450px;
      margin: auto;
      padding: 28px;
    }

    .topbar {
      background: #111827;
      color: white;
      padding: 22px 26px;
      border-radius: 18px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h1 {
      margin: 0;
      font-size: 26px;
    }

    .topbar p {
      margin: 6px 0 0;
      color: #d1d5db;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:hover { background: #374151; }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #991b1b;
      font-size: 12px;
      padding: 8px 10px;
    }

    .success {
      background: #065f46;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .message {
      margin-top: 14px;
      font-weight: 700;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 12px;
      border-radius: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1250px;
      background: white;
    }

    th {
      background: #f9fafb;
      text-align: left;
      font-size: 13px;
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
    }

    input, textarea {
      width: 100%;
      padding: 9px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
    }

    input[readonly] {
      background: #f3f4f6;
      color: #6b7280;
      cursor: not-allowed;
    }

    textarea {
      min-height: 42px;
      resize: vertical;
    }

    .checkbox-center {
      text-align: center;
    }

    .checkbox-center input {
      width: auto;
      transform: scale(1.2);
      margin-top: 8px;
    }

    .suggestions {
      display: none;
      position: absolute;
      z-index: 20;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      max-height: 220px;
      overflow-y: auto;
      width: 360px;
    }

    .suggestion {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
    }

    .suggestion:hover {
      background: #f9fafb;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <div>
        <h1>Sales Rep Portal</h1>
        <p id="welcome"></p>
      </div>

      <button class="secondary" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <h2>Ups & Downs Product Cost Report</h2>
      <p class="muted" id="monthInfo"></p>

      <div class="actions">
        <button type="button" onclick="addNewProductLine()">Add New Product Line</button>
        <button type="button" class="success" onclick="submitAllProducts()">Submit All Products</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:110px;">Item No.</th>
              <th style="width:260px;">Description</th>
              <th style="width:90px;">BPC</th>
              <th id="monthHead0" style="width:120px;">Month</th>
              <th id="monthHead1" style="width:120px;">Month + 1</th>
              <th id="monthHead2" style="width:120px;">Month + 2</th>
              <th id="monthHead3" style="width:120px;">Month + 3</th>
              <th style="width:130px;">Permanent Price Increase</th>
              <th style="width:220px;">Notes</th>
              <th style="width:90px;">Actions</th>
            </tr>
          </thead>
          <tbody id="pricingBody"></tbody>
        </table>
      </div>

      <div id="message" class="message">Loading portal...</div>
    </div>

  </div>

  <div id="suggestions" class="suggestions"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2RlItMOrAQbF1wEU9HMEGnl1OZ_Qrxe2fmfc0ne2TqezoFPXZ8k7-1yl0l1yC1VjyLw/exec";

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user || String(user.role).toLowerCase() !== "sales rep") {
      window.location.href = "index.html";
    }

    document.getElementById("welcome").textContent =
      `Welcome, ${user.name}. Supplier: ${user.supplier}. Division: ${user.division}.`;

    let inventory = [];
    let productRows = [];
    let activeDescriptionIndex = null;

    const monthNames = [
      "",
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const now = new Date();
    const baseMonth = now.getMonth() + 1;
    const baseYear = now.getFullYear();

    window.addEventListener("load", async () => {
      setupMonthHeaders();
      await loadInventory();
      await loadLatestRepMonthData();

      if (!productRows.length) {
        addNewProductLine();
      }

      renderTable();
      document.getElementById("message").textContent = "Portal ready.";
    });

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    }

    function buildMonthWindow() {
      const result = [];

      for (let i = 0; i < 4; i++) {
        let month = baseMonth + i;
        let year = baseYear;

        while (month > 12) {
          month -= 12;
          year++;
        }

        result.push({ month, year });
      }

      return result;
    }

    function setupMonthHeaders() {
      const months = buildMonthWindow();

      months.forEach((m, index) => {
        document.getElementById(`monthHead${index}`).textContent =
          `${monthNames[m.month]} ${m.year}`;
      });

      document.getElementById("monthInfo").textContent =
        `Locked reporting window: ${monthNames[months[0].month]} ${months[0].year} through ${monthNames[months[3].month]} ${months[3].year}`;
    }

    async function loadInventory() {
      const message = document.getElementById("message");
      message.textContent = "Loading inventory...";

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getInventory`);
        const data = await res.json();

        if (data.success) {
          inventory = data.items || [];
        } else {
          message.textContent = data.message || "Could not load inventory.";
        }
      } catch (err) {
        message.textContent = "Inventory load error.";
      }
    }

    async function loadLatestRepMonthData() {
      const message = document.getElementById("message");
      message.textContent = "Loading latest saved pricing...";

      try {
        const res = await fetch(
          `${SCRIPT_URL}?action=getRepLatestMonthData&username=${encodeURIComponent(user.username)}&baseMonth=${baseMonth}&baseYear=${baseYear}`
        );

        const data = await res.json();

        if (!data.success) {
          message.textContent = data.message || "Could not load latest pricing.";
          return;
        }

        productRows = (data.results || []).map(product => ({
          itemNo: product.itemNo || "",
          description: product.description || "",
          bottlesPerCase: product.bpc || "",
          prices: [
            product.prices["Current"]?.price || "",
            product.prices["30 Day"]?.price || "",
            product.prices["60 Day"]?.price || "",
            product.prices["90 Day"]?.price || ""
          ],
          permanentIncrease: String(product.permanentIncrease).toLowerCase() === "yes",
          notes: product.notes || ""
        }));

      } catch (err) {
        message.textContent = "Latest pricing load error.";
      }
    }

    function addNewProductLine() {
      productRows.push({
        itemNo: "",
        description: "",
        bottlesPerCase: "",
        prices: ["", "", "", ""],
        permanentIncrease: false,
        notes: ""
      });

      renderTable();
    }

    function renderTable() {
      const body = document.getElementById("pricingBody");
      body.innerHTML = "";

      productRows.forEach((row, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>
            <input type="text" value="${escapeAttr(row.itemNo)}" readonly>
          </td>

          <td style="position:relative;">
            <input
              type="text"
              value="${escapeAttr(row.description)}"
              placeholder="Search description..."
              oninput="handleDescriptionInput(${index}, this)"
              onfocus="handleDescriptionInput(${index}, this)"
            >
          </td>

          <td>
            <input
              type="number"
              min="1"
              value="${escapeAttr(row.bottlesPerCase)}"
              onchange="updateCell(${index}, 'bottlesPerCase', this.value)"
            >
          </td>

          <td>
            <input type="number" step="0.01" value="${escapeAttr(row.prices[0])}" onchange="updatePrice(${index}, 0, this.value)">
          </td>

          <td>
            <input type="number" step="0.01" value="${escapeAttr(row.prices[1])}" onchange="updatePrice(${index}, 1, this.value)">
          </td>

          <td>
            <input type="number" step="0.01" value="${escapeAttr(row.prices[2])}" onchange="updatePrice(${index}, 2, this.value)">
          </td>

          <td>
            <input type="number" step="0.01" value="${escapeAttr(row.prices[3])}" onchange="updatePrice(${index}, 3, this.value)">
          </td>

          <td class="checkbox-center">
            <input
              type="checkbox"
              ${row.permanentIncrease ? "checked" : ""}
              onchange="updateCell(${index}, 'permanentIncrease', this.checked)"
            >
          </td>

          <td>
            <textarea onchange="updateCell(${index}, 'notes', this.value)">${escapeHtml(row.notes)}</textarea>
          </td>

          <td>
            <button type="button" class="danger" onclick="removeRow(${index})">Remove</button>
          </td>
        `;

        body.appendChild(tr);
      });
    }

    function updateCell(index, field, value) {
      productRows[index][field] = value;
    }

    function updatePrice(index, priceIndex, value) {
      productRows[index].prices[priceIndex] = value;
    }

    function removeRow(index) {
      productRows.splice(index, 1);
      renderTable();
      document.getElementById("message").textContent = "Product row removed.";
    }

    function handleDescriptionInput(index, input) {
      const query = input.value.trim().toLowerCase();

      productRows[index].description = input.value;
      activeDescriptionIndex = index;

      const box = document.getElementById("suggestions");
      box.innerHTML = "";

      if (query.length < 2) {
        box.style.display = "none";
        return;
      }

      const matches = inventory
        .filter(item => item.description.toLowerCase().includes(query))
        .slice(0, 20);

      if (!matches.length) {
        box.style.display = "none";
        return;
      }

      matches.forEach(item => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.innerHTML = `
          <strong>${escapeHtml(item.description)}</strong><br>
          <span class="muted">Item No. ${escapeHtml(item.itemNo)}</span>
        `;
        div.onclick = () => selectInventoryItem(index, item);
        box.appendChild(div);
      });

      const rect = input.getBoundingClientRect();
      box.style.left = `${rect.left + window.scrollX}px`;
      box.style.top = `${rect.bottom + window.scrollY + 4}px`;
      box.style.width = `${rect.width}px`;
      box.style.display = "block";
    }

    async function selectInventoryItem(index, item) {
      productRows[index].itemNo = item.itemNo;
      productRows[index].description = item.description;

      document.getElementById("suggestions").style.display = "none";

      await loadBPCForRow(index, item.itemNo);
      await loadCarryForwardForRow(index, item.itemNo);

      renderTable();
      document.getElementById("message").textContent =
        "Product selected. BPC and previous pricing loaded where available.";
    }

    async function loadBPCForRow(index, itemNo) {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getBPC&itemNo=${encodeURIComponent(itemNo)}`);
        const data = await res.json();

        if (data.success && data.found) {
          productRows[index].bottlesPerCase = data.bottlesPerCase;
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadCarryForwardForRow(index, itemNo) {
      try {
        const res = await fetch(
          `${SCRIPT_URL}?action=getCarryForwardPrices&username=${encodeURIComponent(user.username)}&itemNo=${encodeURIComponent(itemNo)}&baseMonth=${baseMonth}&baseYear=${baseYear}`
        );

        const data = await res.json();

        if (!data.success) return;

        const months = buildMonthWindow();

        months.forEach((m, priceIndex) => {
          const key = `${m.month}-${m.year}`;
          const prior = data.prices[key];

          if (prior && prior.price !== "") {
            productRows[index].prices[priceIndex] = prior.price;
          }
        });

      } catch (err) {
        console.error(err);
      }
    }

    async function submitAllProducts() {
      const message = document.getElementById("message");

      const validRows = productRows.filter(row =>
        row.itemNo &&
        row.description &&
        row.bottlesPerCase &&
        row.prices.some(price => String(price).trim() !== "")
      );

      if (!validRows.length) {
        message.textContent = "Please enter at least one complete product line before submitting.";
        return;
      }

      const months = buildMonthWindow();
      const priceTypes = ["Current", "30 Day", "60 Day", "90 Day"];

      const products = validRows.map(row => ({
        itemNo: row.itemNo,
        description: row.description,
        bottlesPerCase: row.bottlesPerCase,
        permanentIncrease: row.permanentIncrease,
        notes: row.notes,
        prices: months.map((m, index) => ({
          priceMonth: m.month,
          priceYear: m.year,
          priceType: priceTypes[index],
          price: row.prices[index]
        }))
      }));

      const payload = {
        action: "saveRepSubmission",
        repName: user.name,
        username: user.username,
        supplier: user.supplier,
        division: user.division,
        baseMonth,
        baseYear,
        products
      };

      message.textContent = "Submitting all products...";

      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {
          message.textContent = `Submission saved. ${result.productCount} product(s) submitted.`;
        } else {
          message.textContent = result.message || "Submission failed.";
        }

      } catch (err) {
        console.error(err);
        message.textContent = "Submission error. Please try again.";
      }
    }

    document.addEventListener("click", function(e) {
      const box = document.getElementById("suggestions");
      if (!box.contains(e.target) && e.target.tagName !== "INPUT") {
        box.style.display = "none";
      }
    });

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
