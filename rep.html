<!-- rep.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sales Rep Portal</title>
</head>
<body>
  <h1>Sales Rep Portal</h1>
  <p id="welcome"></p>

  <button onclick="logout()">Logout</button>

  <hr>

  <h2>Add Product Pricing</h2>

  <label>Search Product by Description</label><br>
  <input type="text" id="descriptionSearch" placeholder="Start typing description..." autocomplete="off">
  <div id="suggestions"></div>

  <br><br>

  <label>Item No.</label><br>
  <input type="text" id="itemNo" readonly style="background:#e5e7eb;">

  <br><br>

  <label>Bottles Per Case</label><br>
  <input type="number" id="bottlesPerCase" min="1">
  <p id="bpcMessage"></p>

  <br>

  <label>Base Month</label><br>
  <input type="text" id="baseMonthDisplay" readonly style="background:#e5e7eb;">
  <input type="hidden" id="baseMonth">

  <br><br>

  <label>Base Year</label><br>
  <input type="number" id="baseYear" readonly style="background:#e5e7eb;">

  <br><br>

  <h3>Pricing</h3>

  <label id="priceLabel0">Current Month Price</label><br>
  <input type="number" step="0.01" id="price0">

  <br><br>

  <label id="priceLabel1">30 Day Price</label><br>
  <input type="number" step="0.01" id="price1">

  <br><br>

  <label id="priceLabel2">60 Day Price</label><br>
  <input type="number" step="0.01" id="price2">

  <br><br>

  <label id="priceLabel3">90 Day Price</label><br>
  <input type="number" step="0.01" id="price3">

  <br><br>

  <label>
    <input type="checkbox" id="permanentIncrease">
    Permanent Price Increase
  </label>

  <br><br>

  <label>Notes</label><br>
  <textarea id="notes" rows="4" placeholder="Enter notes..."></textarea>

  <br><br>

  <button type="button" onclick="addProductToSubmission()">Add Product to Submission</button>

  <hr>

  <h2>Current Submission</h2>

  <table border="1" cellpadding="8" cellspacing="0" width="100%">
    <thead>
      <tr>
        <th>Item No.</th>
        <th>Description</th>
        <th>BPC</th>
        <th>Permanent Increase</th>
        <th>Notes</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody id="submissionBody"></tbody>
  </table>

  <br>

  <button type="button" onclick="submitAllProducts()">Submit All Products</button>

  <p id="message"></p>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuPzfFEz3yCMqPXlY14gANA0D3R2l4ys3gR2blZFZuXo5N3YQ6O3bBAaLJM5h-NeNg4w/exec";

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (!user || String(user.role).toLowerCase() !== "sales rep") {
      window.location.href = "index.html";
    }

    document.getElementById("welcome").textContent =
      `Welcome, ${user.name}. Supplier: ${user.supplier}. Division: ${user.division}.`;

    let inventory = [];
    let selectedItem = null;
    let submissionProducts = [];

    const monthNames = [
      "",
      "January",
      "February",
      "March",
      "April",
      "May",
      "June",
      "July",
      "August",
      "September",
      "October",
      "November",
      "December"
    ];

    window.addEventListener("load", async () => {
      setupLockedBaseMonth();
      updatePriceLabels();
      await loadInventory();
    });

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    }

    function setupLockedBaseMonth() {
      const now = new Date();
      const currentMonth = now.getMonth() + 1;
      const currentYear = now.getFullYear();

      document.getElementById("baseMonth").value = currentMonth;
      document.getElementById("baseMonthDisplay").value = monthNames[currentMonth];
      document.getElementById("baseYear").value = currentYear;
    }

    function buildMonthWindow() {
      const baseMonth = Number(document.getElementById("baseMonth").value);
      const baseYear = Number(document.getElementById("baseYear").value);

      const result = [];

      for (let i = 0; i < 4; i++) {
        let month = baseMonth + i;
        let year = baseYear;

        while (month > 12) {
          month -= 12;
          year++;
        }

        result.push({ month, year });
      }

      return result;
    }

    function updatePriceLabels() {
      const months = buildMonthWindow();
      const types = ["Current Month", "30 Day", "60 Day", "90 Day"];

      months.forEach((m, index) => {
        document.getElementById(`priceLabel${index}`).textContent =
          `${monthNames[m.month]} ${m.year} Price (${types[index]})`;
      });
    }

    async function loadInventory() {
      const message = document.getElementById("message");
      message.textContent = "Loading inventory...";

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getInventory`);
        const data = await res.json();

        if (data.success) {
          inventory = data.items || [];
          message.textContent = `Inventory loaded. ${inventory.length} items available.`;
        } else {
          message.textContent = data.message || "Could not load inventory.";
        }
      } catch (err) {
        message.textContent = "Inventory load error.";
      }
    }

    const searchInput = document.getElementById("descriptionSearch");
    const suggestionsBox = document.getElementById("suggestions");

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      suggestionsBox.innerHTML = "";

      if (query.length < 2) {
        suggestionsBox.style.display = "none";
        return;
      }

      const matches = inventory
        .filter(item => item.description.toLowerCase().includes(query))
        .slice(0, 25);

      if (!matches.length) {
        suggestionsBox.style.display = "none";
        return;
      }

      matches.forEach(item => {
        const div = document.createElement("div");
        div.textContent = `${item.description} — ${item.itemNo}`;
        div.style.padding = "8px";
        div.style.cursor = "pointer";
        div.style.borderBottom = "1px solid #ddd";

        div.onclick = () => selectItem(item);

        suggestionsBox.appendChild(div);
      });

      suggestionsBox.style.display = "block";
      suggestionsBox.style.border = "1px solid #ccc";
      suggestionsBox.style.maxHeight = "200px";
      suggestionsBox.style.overflowY = "auto";
      suggestionsBox.style.background = "white";
    });

    async function selectItem(item) {
      selectedItem = item;

      document.getElementById("descriptionSearch").value = item.description;
      document.getElementById("itemNo").value = item.itemNo;
      suggestionsBox.style.display = "none";

      clearPricesOnly();

      await loadBPC(item.itemNo);
      await loadCarryForwardPrices();
    }

    async function loadBPC(itemNo) {
      const bpcInput = document.getElementById("bottlesPerCase");
      const bpcMessage = document.getElementById("bpcMessage");

      bpcInput.value = "";
      bpcMessage.textContent = "Checking bottles per case...";

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getBPC&itemNo=${encodeURIComponent(itemNo)}`);
        const data = await res.json();

        if (data.success && data.found) {
          bpcInput.value = data.bottlesPerCase;
          bpcMessage.textContent = "Bottles per case found and auto-filled.";
        } else {
          bpcMessage.textContent = "No BPC found. Please enter manually.";
        }
      } catch (err) {
        bpcMessage.textContent = "Could not check BPC.";
      }
    }

    async function loadCarryForwardPrices() {
      if (!selectedItem) return;

      const username = encodeURIComponent(user.username);
      const itemNo = encodeURIComponent(selectedItem.itemNo);
      const baseMonth = document.getElementById("baseMonth").value;
      const baseYear = document.getElementById("baseYear").value;

      const message = document.getElementById("message");
      message.textContent = "Checking previous pricing...";

      try {
        const res = await fetch(
          `${SCRIPT_URL}?action=getCarryForwardPrices&username=${username}&itemNo=${itemNo}&baseMonth=${baseMonth}&baseYear=${baseYear}`
        );

        const data = await res.json();

        if (!data.success) {
          message.textContent = data.message || "Could not load previous prices.";
          return;
        }

        const months = buildMonthWindow();

        months.forEach((m, index) => {
          const key = `${m.month}-${m.year}`;
          const prior = data.prices[key];

          if (prior && prior.price !== "") {
            document.getElementById(`price${index}`).value = prior.price;
          }
        });

        message.textContent = "Previous pricing loaded where available. All fields remain editable.";
      } catch (err) {
        message.textContent = "Previous pricing lookup error.";
      }
    }

    function addProductToSubmission() {
      const message = document.getElementById("message");

      if (!selectedItem) {
        message.textContent = "Please select an item first.";
        return;
      }

      const bottlesPerCase = document.getElementById("bottlesPerCase").value.trim();

      if (!bottlesPerCase) {
        message.textContent = "Please enter bottles per case.";
        return;
      }

      const months = buildMonthWindow();
      const priceTypes = ["Current", "30 Day", "60 Day", "90 Day"];

      const prices = months.map((m, index) => ({
        priceMonth: m.month,
        priceYear: m.year,
        price: document.getElementById(`price${index}`).value.trim(),
        priceType: priceTypes[index]
      }));

      if (!prices.some(p => p.price !== "")) {
        message.textContent = "Please enter at least one price.";
        return;
      }

      const alreadyAddedIndex = submissionProducts.findIndex(
        product => product.itemNo === selectedItem.itemNo
      );

      const productData = {
        itemNo: selectedItem.itemNo,
        description: selectedItem.description,
        bottlesPerCase,
        permanentIncrease: document.getElementById("permanentIncrease").checked,
        notes: document.getElementById("notes").value.trim(),
        prices
      };

      if (alreadyAddedIndex >= 0) {
        submissionProducts[alreadyAddedIndex] = productData;
        message.textContent = "Product already existed in this submission, so it was updated.";
      } else {
        submissionProducts.push(productData);
        message.textContent = "Product added to current submission.";
      }

      renderSubmissionTable();
      clearProductForm();
    }

    function renderSubmissionTable() {
      const body = document.getElementById("submissionBody");
      body.innerHTML = "";

      submissionProducts.forEach((product, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${escapeHtml(product.itemNo)}</td>
          <td>${escapeHtml(product.description)}</td>
          <td>${escapeHtml(product.bottlesPerCase)}</td>
          <td>${product.permanentIncrease ? "Yes" : "No"}</td>
          <td>${escapeHtml(product.notes)}</td>
          <td>
            <button type="button" onclick="removeProduct(${index})">Remove</button>
          </td>
        `;

        body.appendChild(tr);
      });
    }

    function removeProduct(index) {
      submissionProducts.splice(index, 1);
      renderSubmissionTable();
      document.getElementById("message").textContent = "Product removed.";
    }

    async function submitAllProducts() {
      const message = document.getElementById("message");

      if (!submissionProducts.length) {
        message.textContent = "Please add at least one product to the submission.";
        return;
      }

      const payload = {
        action: "saveRepSubmission",
        repName: user.name,
        username: user.username,
        supplier: user.supplier,
        division: user.division,
        baseMonth: Number(document.getElementById("baseMonth").value),
        baseYear: Number(document.getElementById("baseYear").value),
        products: submissionProducts
      };

      message.textContent = "Submitting all products...";

      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {
          message.textContent =
            `Submission saved. ${result.productCount} product(s) submitted.`;

          submissionProducts = [];
          renderSubmissionTable();
          clearProductForm();
        } else {
          message.textContent = result.message || "Submission failed.";
        }
      } catch (err) {
        console.error(err);
        message.textContent = "Submission error. Please try again.";
      }
    }

    function clearPricesOnly() {
      for (let i = 0; i < 4; i++) {
        document.getElementById(`price${i}`).value = "";
      }

      document.getElementById("permanentIncrease").checked = false;
      document.getElementById("notes").value = "";
    }

    function clearProductForm() {
      selectedItem = null;

      document.getElementById("descriptionSearch").value = "";
      document.getElementById("itemNo").value = "";
      document.getElementById("bottlesPerCase").value = "";
      document.getElementById("bpcMessage").textContent = "";

      clearPricesOnly();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
